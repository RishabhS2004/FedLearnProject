name: RadioFed CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.11", "3.12"]

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install uv
        run: pip install uv

      - name: Cache uv environment
        uses: actions/cache@v4
        with:
          path: ~/.cache/uv
          key: ${{ runner.os }}-uv-${{ matrix.python-version }}-${{ hashFiles('pyproject.toml') }}

      - name: Install dependencies
        run: uv sync

      - name: Run unit tests (no dataset required)
        run: |
          uv run pytest tests/test_byzantine.py tests/test_feature_extract.py tests/test_dataset_loader.py tests/test_dashboard_metrics.py tests/test_integration_amc.py -v --tb=short

      - name: Download and partition RadioML dataset
        run: |
          cd data
          curl -L -o ./radioml2016-deepsigcom.zip \
            https://www.kaggle.com/api/v1/datasets/download/nolasthitnotomorrow/radioml2016-deepsigcom || echo "Dataset download skipped"
          unzip -o ./radioml2016-deepsigcom.zip -d ./ || echo "No dataset to unzip"

      - name: Partition dataset
        run: uv run data/partition_dataset.py --input RML2016.10a_dict.pkl --num-clients 4 || echo "Skipping partition"

      - name: Run full test suite
        run: uv run pytest -v --maxfail=3 --tb=short
